services:
  - type: web
    name: so-almuerzos
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: PLACES_PROVIDER
        value: google
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACES_FREE_CAP
        value: 5000
      - key: GOOGLE_PLACES_SAFETY_BUFFER
        value: 100
      - key: GOOGLE_PLACES_MONTHLY_LIMIT
        value: 4900
